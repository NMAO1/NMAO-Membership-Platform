<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:#C9A84C; --black:#0A0A0A; --surface:#141414; --surf2:#1A1A1A;
      --border:#2A2520; --white:#F5F0E8; --muted:#7A7060; --muted2:#9A8F80;
      --green:#5A9A6A; --red:#C07070;
      --font-display:'Cormorant Garamond',serif; --font-ui:'Lato',sans-serif;
    }
    body { background:var(--black); color:var(--white); font-family:var(--font-ui);
      min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:1.5rem 1rem 4rem; }
    .page-header { text-align:center; margin-bottom:1.25rem; }
    /* Embed mode: drop full-page chrome so it sits cleanly inside a host-site iframe. */
    body.embed { background:transparent; padding:0.5rem; min-height:0; }
    body.embed .page-header { display:none; }
    .school-logo-img { max-height:52px; max-width:150px; object-fit:contain; margin-bottom:0.35rem; }
    .page-logo { font-family:var(--font-display); font-size:1.6rem; color:var(--gold);
      letter-spacing:0.22em; text-transform:uppercase; }
    .page-headline { font-size:0.82rem; color:var(--muted2); margin-top:0.4rem; letter-spacing:0.04em; }
    .container { width:100%; max-width:520px; }
    .error-box { background:rgba(192,112,112,0.12); border:1px solid var(--red); color:var(--red);
      padding:1rem; text-align:center; font-size:0.9rem; }

    .view-bar { display:flex; justify-content:space-between; align-items:center; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap; }
    .view-toggle { display:inline-flex; border:1px solid var(--border); border-radius:6px; overflow:hidden; }
    .view-toggle button { background:var(--surface); color:var(--muted2); border:none; padding:0.45rem 0.9rem;
      font-family:var(--font-ui); font-size:0.8rem; cursor:pointer; }
    .view-toggle button.active { background:var(--gold); color:var(--black); font-weight:700; }
    .date-nav { display:inline-flex; align-items:center; gap:0.75rem; }
    .date-nav button { background:var(--surface); color:var(--white); border:1px solid var(--border);
      width:32px; height:32px; border-radius:6px; cursor:pointer; }
    #rangeLabel { font-size:0.85rem; color:var(--muted2); min-width:120px; text-align:center; }

    .day-group { margin-bottom:1.5rem; }
    .day-head { font-family:var(--font-display); font-size:1.15rem; color:var(--gold);
      border-bottom:1px solid var(--border); padding-bottom:0.3rem; margin-bottom:0.75rem; }
    .class-card { background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--gold);
      padding:0.85rem 1rem; margin-bottom:0.7rem; }
    .cc-top { display:flex; justify-content:space-between; align-items:baseline; gap:0.5rem; }
    .cc-name { font-size:1rem; font-weight:700; color:var(--white); }
    .cc-time { font-size:0.82rem; color:var(--gold); white-space:nowrap; }
    .cc-meta { font-size:0.76rem; color:var(--muted2); margin-top:0.2rem; }
    .cc-spots { font-size:0.74rem; color:var(--muted); margin-top:0.15rem; }
    .cc-spots.low { color:var(--gold); }
    .cc-full { font-size:0.74rem; color:var(--red); margin-top:0.15rem; }
    .cc-actions { display:flex; gap:0.5rem; margin-top:0.7rem; flex-wrap:wrap; }
    .btn { font-family:var(--font-ui); font-size:0.82rem; padding:0.5rem 0.9rem; border-radius:6px; cursor:pointer; border:1px solid var(--gold); }
    .btn-primary { background:var(--gold); color:var(--black); font-weight:700; border:none; }
    .btn-ghost { background:transparent; color:var(--gold); }
    .btn:disabled { opacity:0.45; cursor:not-allowed; }
    .empty { text-align:center; color:var(--muted); font-size:0.9rem; padding:2rem 0; }

    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); display:none;
      align-items:center; justify-content:center; padding:1rem; z-index:50; }
    .modal-overlay.active { display:flex; }
    .modal-card { background:var(--surf2); border:1px solid var(--border); width:100%; max-width:420px;
      padding:1.5rem; position:relative; max-height:90vh; overflow-y:auto; }
    .modal-close { position:absolute; top:0.75rem; right:0.9rem; background:none; border:none; color:var(--muted2);
      font-size:1.1rem; cursor:pointer; }
    .modal-title { font-family:var(--font-display); font-size:1.3rem; color:var(--gold); margin-bottom:0.25rem; }
    .modal-sub { font-size:0.8rem; color:var(--muted2); margin-bottom:1rem; }
    .field { margin-bottom:0.8rem; }
    .field label { display:block; font-size:0.74rem; color:var(--muted2); margin-bottom:0.25rem; text-transform:uppercase; letter-spacing:0.06em; }
    .field input[type=text], .field input[type=email], .field input[type=tel] {
      width:100%; background:var(--black); border:1px solid var(--border); color:var(--white);
      padding:0.6rem 0.7rem; font-family:var(--font-ui); font-size:0.9rem; border-radius:4px; }
    .consent { display:flex; gap:0.5rem; align-items:flex-start; font-size:0.76rem; color:var(--muted2); margin-bottom:1rem; }
    .consent input { margin-top:0.2rem; }
    .modal-msg { font-size:0.84rem; margin-top:0.5rem; min-height:1.1rem; }
    .modal-msg.err { color:var(--red); } .modal-msg.ok { color:var(--green); }
    .result-icon { font-size:2.2rem; color:var(--green); text-align:center; margin-bottom:0.5rem; }
    .result-icon.bad { color:var(--red); }
    .center { text-align:center; }
  </style>
</head>
<body>
  <div class="page-header">
    <img id="schoolLogoImg" class="school-logo-img" alt="" />
    <div id="schoolLogoText" class="page-logo">&nbsp;</div>
    <div id="pageHeadline" class="page-headline"></div>
  </div>

  <div class="container">
    <div id="errorBox" class="error-box" style="display:none"></div>
    <div id="mainUI" style="display:none">
      <div class="view-bar">
        <div class="view-toggle">
          <button data-view="day" onclick="setView('day')">Day</button>
          <button data-view="week" onclick="setView('week')">Week</button>
          <button data-view="month" onclick="setView('month')">Month</button>
        </div>
        <div class="date-nav">
          <button onclick="navDate(-1)" aria-label="Previous"><i class="fa-solid fa-chevron-left"></i></button>
          <span id="rangeLabel"></span>
          <button onclick="navDate(1)" aria-label="Next"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
      </div>
      <div id="scheduleBox"></div>
    </div>
  </div>

  <div id="modalOverlay" class="modal-overlay">
    <div class="modal-card">
      <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    var SURL = 'https://ykiozrdwudawpxdzbbyc.supabase.co';
    var SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlraW96cmR3dWRhd3B4ZHpiYnljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTAwODQsImV4cCI6MjA5MDYyNjA4NH0.MRv1FnXUpGA0wEWe4cW6lSQFcNb7W0Y_nErSZe1hr8c';
    var sb = supabase.createClient(SURL, SKEY);
    var EF_URL = SURL + '/functions/v1/book-public-class';

    var DAYS = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
    var DAY_LABEL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    var slug = '', school = null, view = 'week', anchor = new Date(), rows = [], showSpots = true;
    var lastReserve = null; // {token, contact} for the confirmation cancel button

    function ymd(d){ var m=d.getMonth()+1, day=d.getDate(); return d.getFullYear()+'-'+(m<10?'0':'')+m+'-'+(day<10?'0':'')+day; }
    function fmtTime(t){ if(!t) return ''; var p=String(t).split(':'); var h=parseInt(p[0],10); var min=p[1]||'00';
      var ap=h>=12?'PM':'AM'; var h12=h%12; if(h12===0)h12=12; return h12+':'+min+' '+ap; }
    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function showError(m){ var e=document.getElementById('errorBox'); e.textContent=m; e.style.display='block'; document.getElementById('mainUI').style.display='none'; }

    window.onload = async function(){
      var p = new URLSearchParams(window.location.search);
      var embedParam = p.get('embed');
      slug = p.get('s') || p.get('slug') || '';
      if(embedParam){ document.body.classList.add('embed'); nmaoInitEmbed(); }
      if(embedParam && embedParam !== '1'){
        var ok = await loadEmbedConfig(embedParam);
        if(!ok){ showError('This embed link is not available.'); return; }
      }
      if(!slug){ showError('No schedule link found. Please use the link provided by the school.'); return; }
      await loadSchool();
    };

    var embedFilter = null;

    async function loadEmbedConfig(embedId){
      try {
        var r = await sb.rpc('get_schedule_embed', { p_embed_id: embedId });
        if(r.error || !r.data || !r.data.length) return false;
        var cfg = r.data[0];
        slug = cfg.slug || '';
        embedFilter = { type: cfg.filter_type || 'all', values: cfg.filter_values || [] };
        if(cfg.embed_name){ document.title = cfg.embed_name; }
        return !!slug;
      } catch(e){ return false; }
    }

    function applyEmbedFilter(list){
      if(!embedFilter || embedFilter.type === 'all') return list;
      var vals = embedFilter.values || [];
      if(!vals.length) return list;
      var key = { program:'program_id', classes:'class_id', style:'style', age:'age_group', level:'level', instructor:'instructor_name' }[embedFilter.type];
      if(!key) return list;
      return list.filter(function(row){ return vals.indexOf(row[key]) !== -1; });
    }

    function nmaoPostHeight(){
      if(window.parent === window) return;
      var h = Math.ceil(document.documentElement.getBoundingClientRect().height);
      window.parent.postMessage({ nmaoEmbed:true, height:h }, '*');
    }
    function nmaoInitEmbed(){
      window.addEventListener('resize', nmaoPostHeight);
      if('ResizeObserver' in window){ try{ new ResizeObserver(nmaoPostHeight).observe(document.body); }catch(e){} }
      setTimeout(nmaoPostHeight, 300);
    }

    async function loadSchool(){
      var r = await sb.from('schools')
        .select('id,name,logo_url,color,bg_color,border_color,surface_color,font_color,font_family,public_booking_show_spots,public_booking_default_view,public_booking_headline')
        .eq('slug', slug).maybeSingle();
      if(r.error || !r.data){ showError('This schedule link is not active or does not exist. Please contact the school.'); return; }
      school = r.data;
      document.title = 'Class Schedule — ' + school.name;
      document.getElementById('schoolLogoText').textContent = school.name;
      if(school.logo_url){
        var img=document.getElementById('schoolLogoImg'); img.src=school.logo_url; img.style.display='block';
        document.getElementById('schoolLogoText').style.display='none';
      }
      if(school.color)        document.documentElement.style.setProperty('--gold', school.color);
      if(school.bg_color)     document.documentElement.style.setProperty('--black', school.bg_color);
      if(school.border_color) document.documentElement.style.setProperty('--border', school.border_color);
      if(school.surface_color){ document.documentElement.style.setProperty('--surface', school.surface_color); document.documentElement.style.setProperty('--surf2', school.surface_color); }
      if(school.font_color)   document.documentElement.style.setProperty('--white', school.font_color);
      if(school.font_family)  document.documentElement.style.setProperty('--font-display', "'"+school.font_family+"',serif");
      document.getElementById('pageHeadline').textContent = school.public_booking_headline || '';
      showSpots = school.public_booking_show_spots !== false;
      view = (school.public_booking_default_view==='day'||school.public_booking_default_view==='month') ? school.public_booking_default_view : 'week';
      document.getElementById('mainUI').style.display='block';
      syncViewButtons();
      await loadSchedule();
    }

    function syncViewButtons(){
      var btns=document.querySelectorAll('.view-toggle button');
      for(var i=0;i<btns.length;i++){ btns[i].classList.toggle('active', btns[i].getAttribute('data-view')===view); }
    }
    function setView(v){ view=v; anchor=new Date(); syncViewButtons(); loadSchedule(); }
    function navDate(dir){
      if(view==='day') anchor.setDate(anchor.getDate()+dir);
      else if(view==='week') anchor.setDate(anchor.getDate()+7*dir);
      else { anchor.setMonth(anchor.getMonth()+dir); }
      loadSchedule();
    }
    function computeRange(){
      var s=new Date(anchor), e=new Date(anchor);
      if(view==='day'){ /* same day */ }
      else if(view==='week'){ s.setDate(anchor.getDate()-anchor.getDay()); e=new Date(s); e.setDate(s.getDate()+6); }
      else { s=new Date(anchor.getFullYear(),anchor.getMonth(),1); e=new Date(anchor.getFullYear(),anchor.getMonth()+1,0); }
      return { start:s, end:e };
    }
    function rangeLabel(s,e){
      if(view==='day') return DAY_LABEL[s.getDay()]+', '+MONTHS[s.getMonth()].slice(0,3)+' '+s.getDate();
      if(view==='month') return MONTHS[s.getMonth()]+' '+s.getFullYear();
      return MONTHS[s.getMonth()].slice(0,3)+' '+s.getDate()+' – '+MONTHS[e.getMonth()].slice(0,3)+' '+e.getDate();
    }

    async function loadSchedule(){
      var rg=computeRange();
      document.getElementById('rangeLabel').textContent = rangeLabel(rg.start, rg.end);
      document.getElementById('scheduleBox').innerHTML = '<div class="empty">Loading…</div>';
      var r = await sb.rpc('get_public_class_schedule', { p_slug:slug, p_start:ymd(rg.start), p_end:ymd(rg.end) });
      if(r.error){ document.getElementById('scheduleBox').innerHTML='<div class="empty">Could not load the schedule.</div>'; return; }
      rows = r.data || [];
      rows = applyEmbedFilter(rows);
      renderSchedule();
    }

    function renderSchedule(){
      var box=document.getElementById('scheduleBox');
      if(!rows.length){ box.innerHTML='<div class="empty">No classes scheduled in this range.</div>'; return; }
      var byDay={}, order=[];
      for(var i=0;i<rows.length;i++){
        var d=rows[i].session_date;
        if(!byDay[d]){ byDay[d]=[]; order.push(d); }
        byDay[d].push(rows[i]);
      }
      var html='';
      for(var j=0;j<order.length;j++){
        var dstr=order[j]; var parts=dstr.split('-');
        var dd=new Date(parseInt(parts[0],10),parseInt(parts[1],10)-1,parseInt(parts[2],10));
        html += '<div class="day-group"><div class="day-head">'+DAY_LABEL[dd.getDay()]+', '+MONTHS[dd.getMonth()].slice(0,3)+' '+dd.getDate()+'</div>';
        var list=byDay[dstr];
        for(var k=0;k<list.length;k++){
          var c=list[k]; var idx=rows.indexOf(c);
          var full = (c.capacity!=null && c.spots_left!=null && c.spots_left<=0);
          html += '<div class="class-card">'
            + '<div class="cc-top"><span class="cc-name">'+esc(c.class_name)+'</span><span class="cc-time">'+fmtTime(c.start_time)+(c.end_time?(' – '+fmtTime(c.end_time)):'')+'</span></div>'
            + '<div class="cc-meta">'+esc(c.program_name||'')+(c.instructor_name?(' · with '+esc(c.instructor_name)):'')+'</div>';
          if(showSpots && c.capacity!=null && c.spots_left!=null){
            if(full) html += '<div class="cc-full">Class full</div>';
            else html += '<div class="cc-spots'+(c.spots_left<=3?' low':'')+'">'+c.spots_left+' spot'+(c.spots_left===1?'':'s')+' left</div>';
          }
          html += '<div class="cc-actions">';
          html += '<button class="btn btn-primary" '+(full?'disabled':'')+' onclick="openReserve('+idx+')">Reserve</button>';
          if(c.trial_enabled) html += '<button class="btn btn-ghost" '+(full?'disabled':'')+' onclick="openTrial('+idx+')">Try a free class</button>';
          html += '</div></div>';
        }
        html += '</div>';
      }
      box.innerHTML=html;
    }

    function openModal(inner){ document.getElementById('modalBody').innerHTML=inner; document.getElementById('modalOverlay').classList.add('active'); }
    function closeModal(){ document.getElementById('modalOverlay').classList.remove('active'); lastReserve=null; }

    function classSummary(c){
      var parts=c.session_date.split('-'); var dd=new Date(parseInt(parts[0],10),parseInt(parts[1],10)-1,parseInt(parts[2],10));
      return esc(c.class_name)+' · '+DAY_LABEL[dd.getDay()]+' '+MONTHS[dd.getMonth()].slice(0,3)+' '+dd.getDate()+' · '+fmtTime(c.start_time);
    }

    function openReserve(idx){
      var c=rows[idx];
      openModal(
        '<div class="modal-title">Reserve your spot</div>'+
        '<div class="modal-sub">'+classSummary(c)+'</div>'+
        '<div class="field"><label>Email or phone on your account</label><input type="text" id="resContact" placeholder="you@example.com" /></div>'+
        '<button class="btn btn-primary" style="width:100%" id="resBtn" onclick="submitReserve('+idx+')">Reserve</button>'+
        '<div class="modal-msg" id="resMsg"></div>'+
        '<div class="modal-sub" style="margin-top:0.75rem">New here? Close this and tap “Try a free class.”</div>'
      );
    }
    async function submitReserve(idx){
      var c=rows[idx]; var contact=document.getElementById('resContact').value.trim();
      var msg=document.getElementById('resMsg'); msg.className='modal-msg';
      if(!contact){ msg.className='modal-msg err'; msg.textContent='Please enter your email or phone.'; return; }
      var btn=document.getElementById('resBtn'); btn.disabled=true; msg.textContent='Reserving…';
      var res=await callEF({ action:'reserve', slug:slug, class_id:c.class_id, session_date:c.session_date, email_or_phone:contact });
      if(!res || !res.ok){ msg.className='modal-msg err'; msg.textContent=(res&&res.error)||'Something went wrong.'; btn.disabled=false; return; }
      lastReserve={ token:res.cancel_token, contact:contact };
      openModal(
        '<div class="result-icon"><i class="fa-solid fa-circle-check"></i></div>'+
        '<div class="center" style="font-size:1rem;margin-bottom:0.4rem">'+esc(res.message||'Reserved!')+'</div>'+
        '<div class="modal-sub center">'+classSummary(c)+'</div>'+
        (res.cancel_token ? '<button class="btn btn-ghost" style="width:100%;margin-top:0.5rem" onclick="submitCancel()">Cancel this reservation</button><div class="modal-msg" id="cxMsg"></div>' : '')+
        '<button class="btn btn-primary" style="width:100%;margin-top:0.6rem" onclick="closeModal();loadSchedule()">Done</button>'
      );
    }
    async function submitCancel(){
      if(!lastReserve) return;
      var msg=document.getElementById('cxMsg'); if(msg){ msg.className='modal-msg'; msg.textContent='Cancelling…'; }
      var res=await callEF({ action:'cancel', slug:slug, cancel_token:lastReserve.token, email_or_phone:lastReserve.contact });
      if(msg){ msg.className='modal-msg '+((res&&res.ok)?'ok':'err'); msg.textContent=(res&&res.message)||(res&&res.error)||'Done.'; }
    }

    function openTrial(idx){
      var c=rows[idx];
      openModal(
        '<div class="modal-title">Try a free class</div>'+
        '<div class="modal-sub">'+classSummary(c)+'</div>'+
        '<div class="field"><label>First name</label><input type="text" id="tFirst" /></div>'+
        '<div class="field"><label>Last name</label><input type="text" id="tLast" /></div>'+
        '<div class="field"><label>Email</label><input type="email" id="tEmail" /></div>'+
        '<div class="field"><label>Phone</label><input type="tel" id="tPhone" /></div>'+
        '<label class="consent"><input type="checkbox" id="tSms" /> <span>Text me class reminders and updates. Msg &amp; data rates may apply.</span></label>'+
        '<button class="btn btn-primary" style="width:100%" id="tBtn" onclick="submitTrial('+idx+')">Book my free class</button>'+
        '<div class="modal-msg" id="tMsg"></div>'
      );
    }
    async function submitTrial(idx){
      var c=rows[idx];
      var first=document.getElementById('tFirst').value.trim();
      var last=document.getElementById('tLast').value.trim();
      var email=document.getElementById('tEmail').value.trim();
      var phone=document.getElementById('tPhone').value.trim();
      var sms=document.getElementById('tSms').checked;
      var msg=document.getElementById('tMsg'); msg.className='modal-msg';
      if(!first || !email){ msg.className='modal-msg err'; msg.textContent='Please enter your first name and email.'; return; }
      var btn=document.getElementById('tBtn'); btn.disabled=true; msg.textContent='Booking…';
      var res=await callEF({ action:'trial', slug:slug, class_id:c.class_id, session_date:c.session_date, first:first, last:last, email:email, phone:phone, sms_consent:sms });
      if(!res || !res.ok){ msg.className='modal-msg err'; msg.textContent=(res&&res.error)||'Something went wrong.'; btn.disabled=false; return; }
      openModal(
        '<div class="result-icon"><i class="fa-solid fa-circle-check"></i></div>'+
        '<div class="center" style="font-size:1rem;margin-bottom:0.4rem">'+esc(res.message||'You are booked!')+'</div>'+
        '<div class="modal-sub center">'+classSummary(c)+'</div>'+
        '<a href="join.html?s='+encodeURIComponent(slug)+'" class="btn btn-ghost" style="display:block;text-align:center;width:100%;margin-top:0.6rem;text-decoration:none">Become a member</a>'+
        '<button class="btn btn-primary" style="width:100%;margin-top:0.5rem" onclick="closeModal();loadSchedule()">Done</button>'
      );
    }

    async function callEF(payload){
      try{
        var r=await fetch(EF_URL, { method:'POST',
          headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+SKEY, 'apikey':SKEY },
          body: JSON.stringify(payload) });
        return await r.json();
      }catch(e){ return { ok:false, error:'Network error. Please try again.' }; }
    }
  </script>
</body>
</html>
